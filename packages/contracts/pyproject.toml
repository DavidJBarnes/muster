[project]
name = "muster-contracts"
version = "0.1.0"
description = "Shared wire contracts for the Muster agent fleet: capabilities, messages, and the ingress interface."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/muster_contracts"]

[dependency-groups]
dev = ["pytest>=8", "pytest-cov>=5", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov=muster_contracts --cov-report=term-missing --cov-fail-under=100"

[tool.coverage.run]
branch = true

[tool.coverage.report]
exclude_also = [
    "@(abc\\.)?abstractmethod",
]
