[project]
name = "muster-agent"
version = "0.1.0"
description = "Local Muster agent: registers with the control plane, heartbeats, and runs jobs through Claude Code headless."
requires-python = ">=3.12"
dependencies = [
    "muster-contracts",
    "pydantic>=2.7",
    "pydantic-settings>=2.2",
    "websockets>=12",
]

[project.scripts]
muster-agent = "muster_agent.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/muster_agent"]

[tool.uv.sources]
muster-contracts = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov=muster_agent --cov-report=term-missing --cov-fail-under=100"

[tool.coverage.run]
branch = true

[tool.coverage.report]
exclude_also = [
    "@(abc\\.)?abstractmethod",
    "if TYPE_CHECKING:",
]
