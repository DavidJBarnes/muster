[project]
name = "muster-controlplane"
version = "0.1.0"
description = "Muster control plane: FastAPI hub agents register, heartbeat, and receive jobs through."
requires-python = ">=3.12"
dependencies = [
    "muster-contracts",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
]

[project.scripts]
muster-controlplane = "muster_controlplane.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/muster_controlplane"]

[tool.uv.sources]
muster-contracts = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "mypy>=1.10",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov=muster_controlplane --cov-report=term-missing --cov-fail-under=100"

[tool.coverage.run]
branch = true

[tool.coverage.report]
exclude_also = [
    "@(abc\\.)?abstractmethod",
    "if TYPE_CHECKING:",
]
